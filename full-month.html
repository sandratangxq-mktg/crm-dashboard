async function sha256(m){var e=new TextEncoder().encode(m);var h=await crypto.subtle.digest("SHA-256",e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("")}
async function unlock(){var p=document.getElementById("pw").value;var h=await sha256(p);if(h===H){document.open();document.write(atob(D));document.close()}else{document.getElementById("err").style.display="block"}}
